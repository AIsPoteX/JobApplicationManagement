<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB APPLICATION MANAGEMENT</title>
    <style>
        :root {
            --bg: #f4f2ee;
            --paper: #fffdf8;
            --ink: #1f2a37;
            --muted: #667085;
            --line: #dfd9ce;
            --accent: #355070;
            --accent-hover: #2b405a;
            --danger: #ba3a3a;
            --pass: #2b8a5d;
        }
        body {
            font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            margin: 20px;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% -10%, #ede7db 0, transparent 35%),
                radial-gradient(circle at 90% 0%, #e8efe9 0, transparent 30%),
                var(--bg);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--paper);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--line);
            box-shadow: 0 14px 35px rgba(20, 23, 30, 0.08);
        }
        h1 {
            color: var(--ink);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 0.04em;
            font-weight: 700;
        }
        .page-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .page-head h2 {
            margin: 0;
        }
        .back-btn {
            background-color: #6c757d;
        }
        .back-btn:hover {
            background-color: #5a6268;
        }
        .toolbar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .btn {
            background-color: var(--accent);
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn-danger {
            background-color: var(--danger);
        }
        .btn-danger:hover {
            background-color: #9e2f2f;
        }
        .btn-small {
            padding: 4px 8px;
            font-size: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .rejected {
            color: #dc3545;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="file"] {
            width: 100%;
        }
        textarea {
            height: 80px;
            resize: vertical;
        }
        .memo-group {
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 10px;
            background: #fafafa;
        }
        .memo-text-section {
            margin-bottom: 8px;
        }
        .memo-attachments-section {
            margin-top: 8px;
        }
        .memo-divider {
            border-top: 1px solid #ddd;
            margin: 8px 0 10px 0;
        }
        .attachment-title {
            font-weight: bold;
            margin-bottom: 6px;
        }
        .attachment-list {
            list-style: none;
            margin: 8px 0 0 0;
            padding: 0;
        }
        .attachment-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px dashed #ddd;
        }
        .attachment-list li:last-child {
            border-bottom: 0;
        }
        .attachment-empty {
            color: #666;
            font-size: 13px;
            margin: 8px 0 0 0;
        }
        .inline-form {
            margin: 0;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .messages {
            margin-bottom: 20px;
        }
        .alert {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .sort-links {
            margin-bottom: 10px;
        }
        .sort-links a {
            margin-right: 15px;
            color: #007bff;
            text-decoration: none;
        }
        .sort-links a:hover {
            text-decoration: underline;
        }
        .sort-links .active {
            font-weight: bold;
            color: #333;
        }
        .status-form {
            margin: 0;
        }
        .status-round-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .date-form {
            margin: 0;
        }
        .status-select {
            width: auto;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            background-color: white;
        }
        .status-select.status-pass {
            color: var(--pass);
            border-color: #b7e4c7;
        }
        .status-select.status-fail {
            color: #c00;
            border-color: #f3c0c0;
        }
        .status-select.status-default {
            color: #666;
        }
        .round-select {
            width: auto;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            background-color: white;
        }
        .round-select.round-final {
            color: #c00;
            border-color: #f3c0c0;
        }
        .date-input {
            width: auto;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            background-color: white;
            min-width: 120px;
        }
        .date-input.date-warning {
            color: #c77f00;
            border-color: #e6b800;
        }
        .date-input.date-danger {
            color: #c00;
            border-color: #d66;
        }
        .status-select option[value="---"] {
            color: #666;
        }
        .status-select option[value="pass"] {
            color: #28a745;
        }
        .status-select option[value="fail"] {
            color: #dc3545;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
            position: sticky;
            top: 0;
            text-align: center;
            vertical-align: middle;
        }
        .job-row {
            background-color: white;
        }
        .status-row {
            background-color: #f9f9f9;
            border-top: none;
        }
        .job-row td, .status-row td {
            border-top: 1px solid #ddd;
            vertical-align: middle;
        }
        .status-row td {
            border-top: none;
            padding-top: 4px;
            padding-bottom: 8px;
        }
        .job-row:hover, .status-row:hover {
            background-color: #f5f5f5;
        }
        .col-memo {
            width: 32%;
        }
        .note-text {
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .brief-search {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .brief-search input {
            min-width: 220px;
        }
        .brief-panel {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            background: #fbfbfb;
        }
        .brief-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .brief-status {
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
        }
        .brief-body {
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .top-toolbar {
            position: sticky;
            top: 8px;
            width: 100%;
            box-sizing: border-box;
            z-index: 50;
            background: rgba(255, 253, 248, 0.94);
            border: 1px solid var(--line);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(18, 24, 35, 0.1);
        }
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sort-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .sort-chips a {
            text-decoration: none;
            color: var(--ink);
            font-size: 13px;
            padding: 5px 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #f8f6f0;
        }
        .sort-chips a.active {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }
        .page-offset {
            margin-top: 12px;
        }
        .job-cards {
            display: grid;
            gap: 12px;
        }
        .job-card {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fff;
            padding: 14px;
            box-shadow: 0 4px 10px rgba(20, 23, 30, 0.05);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .job-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(20, 23, 30, 0.08);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .card-header h3 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.01em;
        }
        .card-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .card-actions form {
            margin: 0;
        }
        .card-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }
        .card-block {
            border: 1px solid #ebe6dd;
            border-radius: 10px;
            padding: 10px;
            background: #fdfcf8;
        }
        .block-title {
            font-size: 12px;
            font-weight: 700;
            color: #5c6f7f;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }
        .block-status-form {
            margin-top: 8px;
        }
        .memo-block {
            grid-column: span 2;
        }
        .memo-status-form {
            margin-bottom: 8px;
        }
        .attachment-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .file-tag {
            display: inline-flex;
            max-width: 100%;
            text-decoration: none;
            color: #335d7f;
            font-size: 12px;
            border: 1px solid #cad9e5;
            background: #f1f7fc;
            border-radius: 999px;
            padding: 4px 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        @media (max-width: 960px) {
            .top-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar-right {
                width: 100%;
            }
            .toolbar-right input {
                min-width: 0;
                flex: 1;
            }
            .page-offset {
                margin-top: 12px;
            }
            .card-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .memo-block {
                grid-column: span 2;
            }
        }
        @media (max-width: 640px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .memo-block {
                grid-column: auto;
            }
            .status-round-row {
                flex-direction: column;
                align-items: stretch;
            }
            .status-select,
            .round-select,
            .date-input {
                width: 100%;
            }
            .page-offset {
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JOB APPLICATION MANAGEMENT</h1>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
